<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Little Oven Atelier - Japanese Bakery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">
    <!-- 🏡 BACKGROUND -->
    <div class="bg-container">
        <!-- 🏗️ LAYOUT -->
        <div class="layout-wrapper">
            
            <!-- 📌 SIDEBAR (Khung cửa xanh) -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <div class="logo-box">🍞 Jenikone!</div>
                </div>
                
                <nav class="nav-menu">
                    <button class="nav-btn active" data-tab="fresh">
                        <span class="nav-icon">🌸</span>
                        <span class="nav-label">Fresh</span>
                    </button>
                    <button class="nav-btn" data-tab="commission">
                        <span class="nav-icon">✨</span>
                        <span class="nav-label">Commission</span>
                    </button>
                    <button class="nav-btn" data-tab="adoptable">
                        <span class="nav-icon">💝</span>
                        <span class="nav-label">Adoptable</span>
                    </button>
                    <button class="nav-btn" data-tab="about">
                        <span class="nav-icon">📖</span>
                        <span class="nav-label">About</span>
                    </button>
                </nav>
            </aside>

            <!-- 📺 MAIN AREA -->
            <main class="main-area">
                
                <!-- 🌙 DARK MODE TOGGLE -->
                <button class="dark-mode-btn" id="darkModeBtn">🌙</button>

                <!-- 🎌 CATEGORY BAR (Horizontal) -->
                <div class="category-bar">
                    <div class="category-wrapper">
                        <button class="cat-nav prev-btn" id="catPrevBtn">❮</button>
                        <div class="category-track" id="categoryTrack">
                            <!-- Categories inserted here -->
                        </div>
                        <button class="cat-nav next-btn" id="catNextBtn">❯</button>
                    </div>
                </div>

                <!-- 📋 CONTENT AREA (Scrollable) -->
                <div class="content-wrapper">
                    <!-- FRESH -->
                    <section id="fresh" class="tab-content active">
                        <h2>Fresh Breads</h2>
                        <p class="placeholder">🍞 Fresh content here</p>
                    </section>

                    <!-- COMMISSION -->
                    <section id="commission" class="tab-content">
                        <h2>Commission</h2>
                        <p class="placeholder">✨ Commission content here</p>
                    </section>

                    <!-- ADOPTABLE -->
                    <section id="adoptable" class="tab-content">
                        <h2>Adoptable Shelf</h2>
                        <div class="card-grid" id="cardGrid">
                            <!-- Cards inserted here -->
                        </div>
                    </section>

                    <!-- ABOUT -->
                    <section id="about" class="tab-content">
                        <h2>About Us</h2>
                        <p class="placeholder">📖 About content here</p>
                    </section>
                </div>
            </main>
        </div>
    </div>

    <!-- 📱 MODAL -->
    <div class="modal" id="cardModal">
        <div class="modal-content">
            <button class="modal-close" id="closeModal">&times;</button>
            <div class="modal-body">
                <div class="modal-image" id="modalImage">🎨</div>
                <div class="modal-info">
                    <h2 id="modalTitle">Title</h2>
                    <p id="modalDesc">Description</p>
                    <p id="modalPrice">Price: 50k</p>
                    <p id="modalStatus">Status</p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
