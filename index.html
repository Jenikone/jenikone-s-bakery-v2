<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Little Oven Atelier - Japanese Bakery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 🏡 HEADER (ROOF) -->
    <header class="header">
        <div class="header-content">
            <h1 class="logo">🍞 Little Oven Atelier</h1>
            <p class="tagline">温かい手作りパン</p>
        </div>
        <div class="roof"></div>
    </header>

    <!-- 🏗️ MAIN LAYOUT -->
    <div class="container">
        <!-- 📌 SIDEBAR (HANGING SIGNS) -->
        <aside class="sidebar">
            <nav class="nav-menu">
                <button class="nav-btn active" data-tab="fresh">
                    <span class="nav-label">🌸 Fresh</span>
                </button>
                <button class="nav-btn" data-tab="commission">
                    <span class="nav-label">✨ Commission</span>
                </button>
                <button class="nav-btn" data-tab="adoptable">
                    <span class="nav-label">💝 Adoptable</span>
                </button>
                <button class="nav-btn" data-tab="about">
                    <span class="nav-label">📖 About</span>
                </button>
            </nav>
        </aside>

        <!-- 📺 MAIN CONTENT -->
        <main class="main-content">
            <!-- 🎌 CURTAIN CATEGORY SYSTEM (NO SCROLL-Y) -->
            <div class="curtain-section">
                <div class="curtain-container">
                    <div class="curtain-wrapper">
                        <div class="curtain-track" id="curtainTrack">
                            <!-- Items will be dynamically inserted here -->
                        </div>
                    </div>
                    <button class="curtain-nav prev-btn" id="prevBtn">❮</button>
                    <button class="curtain-nav next-btn" id="nextBtn">❯</button>
                </div>
            </div>

            <!-- 📋 TAB CONTENT (SCROLLABLE) -->
            <div class="content-area">
                <!-- FRESH TAB -->
                <section id="fresh" class="tab-content active">
                    <h2>Fresh Breads</h2>
                    <p class="placeholder">🍞 Placeholder - Fresh Breads Content</p>
                </section>

                <!-- COMMISSION TAB -->
                <section id="commission" class="tab-content">
                    <h2>Commission</h2>
                    <p class="placeholder">✨ Placeholder - Commission Content</p>
                </section>

                <!-- ADOPTABLE TAB (GRID CARDS) -->
                <section id="adoptable" class="tab-content">
                    <h2>Adoptable Shelf</h2>
                    <div class="card-grid" id="cardGrid">
                        <!-- Cards will be dynamically inserted here -->
                    </div>
                </section>

                <!-- ABOUT TAB -->
                <section id="about" class="tab-content">
                    <h2>About Us</h2>
                    <p class="placeholder">📖 Placeholder - About Content</p>
                </section>
            </div>
        </main>
    </div>

    <!-- 📱 POPUP MODAL -->
    <div class="modal" id="cardModal">
        <div class="modal-content">
            <button class="modal-close" id="closeModal">&times;</button>
            <div class="modal-body">
                <div class="modal-image" id="modalImage">🎨</div>
                <div class="modal-info">
                    <h2 id="modalTitle">Title</h2>
                    <p id="modalDesc">Description</p>
                    <p id="modalPrice">Price: 50k</p>
                    <p id="modalStatus">Status</p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
